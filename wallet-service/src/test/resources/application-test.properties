# Activated with @ActiveProfiles("test"). In-memory H2 (PostgreSQL compatibility) — no Docker DB required.
spring.application.name=wallet-service
server.servlet.context-path=/api/payouts
spring.datasource.url=jdbc:h2:mem:freelance_wallet_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.devtools.restart.enabled=false
spring.main.banner-mode=off
