# Dev stack: hot reload via Spring Boot DevTools + spring-boot:run with bind-mounted sources.
# Usage: docker compose -f docker-compose.dev.yml up --build
# Stop prod compose first if both use host port 5432.

services:
  postgres:
    image: postgres:15-alpine
    container_name: freelance-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelancedb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - freelance-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelancedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./user-service:/workspace
      - maven_repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freelance-dev

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile.dev
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelancedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./job-service:/workspace
      - maven_repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freelance-dev

  proposal-service:
    build:
      context: ./proposal-service
      dockerfile: Dockerfile.dev
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelancedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./proposal-service:/workspace
      - maven_repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freelance-dev

  contract-service:
    build:
      context: ./contract-service
      dockerfile: Dockerfile.dev
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelancedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./contract-service:/workspace
      - maven_repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freelance-dev

  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile.dev
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelancedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - ./wallet-service:/workspace
      - maven_repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freelance-dev

volumes:
  pgdata_dev:
  maven_repo:

networks:
  freelance-dev:
    driver: bridge
